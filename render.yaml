services:
  - type: web
    name: life-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SERVER_HOST
        value: "0.0.0.0"
      - key: SERVER_WORKERS
        value: "1"
      - key: DASHSCOPE_API_KEY
        sync: false   # 在 Render 控制台手动填写
      - key: LLM_BASE_URL
        value: "https://api.deepseek.com/v1"
      - key: LLM_MODEL
        value: "deepseek-chat"
